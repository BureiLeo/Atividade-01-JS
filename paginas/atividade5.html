<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 5 - Sistema de Tarefas</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .tarefa-concluida {
            text-decoration: underline;
            color: green;
        }
        
        .tarefa-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 5px;
        }
        
        .tarefa-texto {
            flex: 1;
        }
        
        .btn-grupo {
            display: flex;
            gap: 5px;
        }
        
        button {
            padding: 5px 10px;
            cursor: pointer;
            border: none;
            border-radius: 3px;
        }
        
        .btn-concluir {
            background-color: #4CAF50;
            color: white;
        }
        
        .btn-remover {
            background-color: #f44336;
            color: white;
        }
        
        #btnAdicionar {
            background-color: #2196F3;
            color: white;
            padding: 10px 20px;
        }
        
        input[type="text"] {
            padding: 10px;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <h1>Sistema de Gerenciamento de Tarefas</h1>
    
    <div>
        <input type="text" id="tarefaInput" placeholder="Digite uma nova tarefa...">
        <button id="btnAdicionar">Adicionar Tarefa</button>
    </div>
    
    <div id="listaTarefas">
        <!-- Tarefas serão adicionadas aqui dinamicamente -->
    </div>
    
    <script src="../js/atividade5.js"></script>
</body>
</html>
